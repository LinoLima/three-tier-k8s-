name: Frontend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-cicd.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-cicd.yml'

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION:       ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY:   ${{ secrets.ECR_REPOSITORY }}
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
  DEPLOYMENT_NAME:  frontend
  CONTAINER_NAME:   frontend
  K8S_NAMESPACE:    three-tier

jobs:
  build-and-deploy:
    name: Build, Push, Deploy
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4

      - name: Checkout frontend app source
        uses: actions/checkout@v4
        with:
          repository: Fractalemma/three-tier-architecture-demo-nextjs-frontend
          path: frontend-src

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.AWS_ROLE_ARN }}
          aws-region:        ${{ env.AWS_REGION }}
          role-session-name: github-actions-frontend-${{ github.run_id }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Copy Dockerfile into app source
        run: cp frontend/Dockerfile frontend-src/Dockerfile

      - name: Build and push image to ECR
        uses: docker/build-push-action@v5
        with:
          context:    ./frontend-src
          file:       ./frontend-src/Dockerfile
          push:       true
          platforms:  linux/amd64
          tags: |
            ${{ env.ECR_REPOSITORY }}:${{ steps.tag.outputs.IMAGE_TAG }}
            ${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=registry,ref=${{ env.ECR_REPOSITORY }}:latest
          cache-to:   type=inline

      - name: Configure kubectl
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name   ${{ env.EKS_CLUSTER_NAME }}

      - name: Deploy to EKS (rolling update)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          kubectl set image deployment/${{ env.DEPLOYMENT_NAME }} \
            ${{ env.CONTAINER_NAME }}=${{ env.ECR_REPOSITORY }}:${{ steps.tag.outputs.IMAGE_TAG }} \
            --namespace ${{ env.K8S_NAMESPACE }}

          kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} \
            --namespace ${{ env.K8S_NAMESPACE }} \
            --timeout=300s

      - name: Deployment summary
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "✅ Deployed: ${{ env.ECR_REPOSITORY }}:${{ steps.tag.outputs.IMAGE_TAG }}"
          kubectl get pods -n ${{ env.K8S_NAMESPACE }} -l app=frontend
